apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-agent
  namespace: sre-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-agent
  template:
    metadata:
      labels:
        app: sre-agent
    spec:
      serviceAccountName: sre-agent-sa # 关联ServiceAccount
      containers:
      - name: agent
        image: ghcr.io/bojay576/sre-agent:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: WATCH_NAMESPACE
          value: "default"
        - name: POLL_INTERVAL_SECONDS
          value: "30"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
