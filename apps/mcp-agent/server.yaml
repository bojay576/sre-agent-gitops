# --- MCP Server Service ---
# 用于让 Gateway 在集群内部访问 Server
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-service
  namespace: ai-services
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: mcp-hr-server

---
# --- MCP Server Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-hr-server
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-hr-server
  template:
    metadata:
      labels:
        app: mcp-hr-server
    spec:
      containers:
      - name: server
        image: ghcr.io/bojay576/mcp-hr-server:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DSN
          valueFrom:
            secretKeyRef:
              name: mcp-server-secret
              key: dsn
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
