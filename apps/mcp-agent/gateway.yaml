# --- AI Gateway Service ---
# 使用 NodePort 暴露服务，方便浏览器访问
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-service
  namespace: ai-services
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080 # 固定端口，方便记忆
  selector:
    app: ai-gateway

---
# --- AI Gateway Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-gateway
  template:
    metadata:
      labels:
        app: ai-gateway
    spec:
      containers:
      - name: gateway
        #改成v5，v5版本更新了大模型url和名称解耦
        image: ai-gateway:v5   
        imagePullPolicy: IfNotPresent # 同样使用本地镜像
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: OLLAMA_URL
          value: "http://ollama-service:11434/api/chat"
        - name: OLLAMA_MODEL
          value: "qwen3:4b"
        # 外部 API 模式时使用（本地 Ollama 模式下值为空字符串，不影响使用）
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: gateway-llm-secret
              key: llm-api-key
              optional: true
