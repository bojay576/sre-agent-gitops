# --- AI Gateway Service ---
# 使用 NodePort 暴露服务，方便浏览器访问
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-service
  namespace: ai-services
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080 # 固定端口，方便记忆
  selector:
    app: ai-gateway

---
# --- AI Gateway Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: ai-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-gateway
  template:
    metadata:
      labels:
        app: ai-gateway
    spec:
      containers:
      - name: gateway
        image: ghcr.io/bojay576/ai-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: LLM_PROVIDER
          value: "ollama"
        - name: LLM_API_URL
          value: "http://ollama-service:11434/api/chat"
        - name: LLM_MODEL
          value: "qwen3:4b"
        - name: OLLAMA_URL
          value: "http://ollama-service:11434/api/chat"
        - name: OLLAMA_MODEL
          value: "qwen3:4b"
        - name: MCP_SERVER_URL
          value: "http://mcp-server-service:8080/sse"
        # 外部 API 模式时使用（本地 Ollama 模式下值为空字符串，不影响使用）
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: gateway-llm-secret
              key: llm-api-key
              optional: true
