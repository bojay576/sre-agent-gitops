# 模拟 CrashLoopBackOff 状态 Pod
# 原因：容器启动后立即退出，K8s 不断重启
#
# 注意：如果 busybox:latest 拉取失败（国内网络或 Docker Hub 限制），
# 可以替换为 docker.io/rancher/mirrored-library-busybox:1.37.0
apiVersion: v1
kind: Pod
metadata:
  name: fault-crashloop
  namespace: default
  labels:
    app: sre-agent-test
    fault-type: crashloop
spec:
  containers:
  - name: app
    image: docker.io/rancher/mirrored-library-busybox:1.37.0
    command: ["sh", "-c", "exit 1"]  # 启动即退出
  restartPolicy: Always
