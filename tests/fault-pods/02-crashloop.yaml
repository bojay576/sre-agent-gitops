# 模拟 CrashLoopBackOff 状态 Pod
# 原因：容器启动后立即退出，K8s 不断重启
apiVersion: v1
kind: Pod
metadata:
  name: fault-crashloop
  namespace: default
  labels:
    app: sre-agent-test
    fault-type: crashloop
spec:
  containers:
  - name: app
    image: busybox:latest
    command: ["sh", "-c", "exit 1"]  # 启动即退出
  restartPolicy: Always
