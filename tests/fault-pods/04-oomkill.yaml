# 模拟 OOMKilled 状态 Pod
# 原因：通过 /dev/shm（tmpfs，占用 RAM）分配大内存触发 OOM
apiVersion: v1
kind: Pod
metadata:
  name: fault-oomkill
  namespace: default
  labels:
    app: sre-agent-test
    fault-type: oomkill
spec:
  containers:
  - name: app
    image: docker.io/rancher/mirrored-library-busybox:1.37.0
    command: ["sh", "-c", "dd if=/dev/zero of=/dev/shm/test bs=1M count=300 2>/dev/null; sleep 10"]
    resources:
      limits:
        memory: "64Mi"      # 限制 64MB，但试图分配 300MB → OOM
      requests:
        memory: "32Mi"
  restartPolicy: Always
