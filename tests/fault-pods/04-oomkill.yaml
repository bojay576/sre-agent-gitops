# 模拟 OOMKilled 状态 Pod
# 原因：内存限制极低，容器一启动就被 OOM Kill，持续重启
apiVersion: v1
kind: Pod
metadata:
  name: fault-oomkill
  namespace: default
  labels:
    app: sre-agent-test
    fault-type: oomkill
spec:
  containers:
  - name: app
    image: polinux/stress:latest
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "256M", "--vm-hang", "1"]
    resources:
      limits:
        memory: "64Mi"    # 内存限制 64MB，但 stress 要 256MB → OOM
      requests:
        memory: "32Mi"
  restartPolicy: Always
