# 模拟 Init 容器失败状态 Pod
# 原因：Init 容器执行失败，主容器永远不会启动
apiVersion: v1
kind: Pod
metadata:
  name: fault-init-fail
  namespace: default
  labels:
    app: sre-agent-test
    fault-type: init-fail
spec:
  initContainers:
  - name: init-setup
    image: docker.io/rancher/mirrored-library-busybox:1.37.0
    command: ["sh", "-c", "echo 'Init failed'; exit 1"]  # Init 容器失败
  containers:
  - name: app
    image: docker.io/rancher/mirrored-library-busybox:1.37.0
    command: ["sh", "-c", "sleep 3600"]
  restartPolicy: Always
